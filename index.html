<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table YAML Editor</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/js-yaml/4.1.0/js-yaml.min.js"></script>
</head>
<body>

    <header>
        <h1>Table-Editor Visualizer</h1>
        <div class="controls">
            <button id="loadBtn">טען קובץ YAML</button>
            <button id="saveBtn">שמור שינויים</button>
            <span id="fileNameDisplay">אין קובץ פתוח</span>
        </div>
    </header>

    <main id="editor-container">
        <div id="base_div_id" class="base_div">
            <p>לחץ על "טען קובץ" כדי להתחיל...</p>
        </div>
    </main>

    <script src="main.js"></script>
</body>
</html>
